name: Release Coverage Report

on:
  workflow_run:
    workflows:
      - Build and Test OpenPDAC-13
    types:
      - completed

  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to analyze (release tag like 1.2.0, or a branch name)"
        required: true
        default: "main"
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: release-coverage-pages
  cancel-in-progress: false

jobs:
  build-coverage:
    if: >
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Determine target ref and version
        id: check
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REFNAME="${{ inputs.ref }}"
          else
            REFNAME="${{ github.event.workflow_run.head_branch }}"
          fi

          echo "refname=$REFNAME" >> "$GITHUB_OUTPUT"

          if echo "$REFNAME" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "is_release_tag=true" >> "$GITHUB_OUTPUT"
            echo "version=$REFNAME" >> "$GITHUB_OUTPUT"
          else
            echo "is_release_tag=false" >> "$GITHUB_OUTPUT"
            echo "version=$REFNAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.check.outputs.refname }}

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo sh -c "wget -O - https://dl.openfoam.org/gpg.key | apt-key add -"
          sudo add-apt-repository http://dl.openfoam.org/ubuntu
          sudo apt-get update
          sudo apt-get -y install openfoam13 wget lcov

      - name: Install Miniconda and create environment
        shell: bash
        run: |
          set -euo pipefail
          wget https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh -O miniconda.sh
          bash miniconda.sh -b -p "$HOME/miniconda"
          source "$HOME/miniconda/bin/activate"
          conda init bash
          conda env create -f environment.yml

      - name: Inject coverage flags
        shell: bash
        run: |
          set -euo pipefail
          find . -name "options" -type f | xargs sed -i '$a \
          EXE_INC += -O0 -fprofile-arcs -ftest-coverage\
          LIB_LIBS += -fprofile-arcs -ftest-coverage\
          EXE_LIBS += -fprofile-arcs -ftest-coverage'

      - name: Build with coverage instrumentation
        run: |
          bash -ic '
            set +m
            
            conda activate OpenPDACconda
            
            source /opt/openfoam13/etc/bashrc
            
            echo "Compiling OpenPDAC solver..."
            cd applications/OpenPDAC
            ./Allwmake
            cd ../../applications/utilities/topoGrid
            wmake
          '

      - name: Run testVulcano coverage
        shell: bash
        run: |
          bash -ic '
            set -e
            set +m
            conda activate OpenPDACconda
            source /opt/openfoam13/etc/bashrc
            cd run/testVulcano
            chmod +x ./run_coverage_testVulcano.sh
            COVERAGE_ROOT=$(pwd)/coverage PROJECT_ROOT=$(cd ../.. && pwd) ./run_coverage_testVulcano.sh
          '

      - name: Prepare Pages content
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.check.outputs.version }}"
          SRC="run/testVulcano/coverage/html"
          PAGES_DIR="pages_site"

          mkdir -p "$PAGES_DIR/$VERSION"
          cp -r "$SRC"/. "$PAGES_DIR/$VERSION"/

          cat > "$PAGES_DIR/index.html" <<EOF
          <!doctype html>
          <html>
          <head><meta charset="utf-8"><title>OpenPDAC coverage</title></head>
          <body>
            <h1>OpenPDAC coverage reports</h1>
            <p>Latest generated report:</p>
            <ul>
              <li><a href="./${VERSION}/index.html">${VERSION}</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ steps.check.outputs.version }}
          path: |
            run/testVulcano/coverage/coverage_clean.info
            run/testVulcano/coverage/html
          if-no-files-found: error

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages_site

  deploy-pages:
    needs: build-coverage
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
