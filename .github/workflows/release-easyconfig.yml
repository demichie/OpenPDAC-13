name: Publish EasyConfig Release Asset

on:
  workflow_run:
    workflows: ["Build and Test OpenPDAC-13"]
    types: [completed]

permissions:
  contents: write

jobs:
  publish-easyconfig:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Validate tag-like version
        id: check
        run: |
          REFNAME="${{ github.event.workflow_run.head_branch }}"
          if echo "$REFNAME" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
            echo "version=$REFNAME" >> "$GITHUB_OUTPUT"
          else
            echo "This successful workflow run was not triggered by a release tag: $REFNAME"
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if not a release tag
        if: steps.check.outputs.is_tag != 'true'
        run: exit 0

      - name: Checkout tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Prepare filenames
        id: meta
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "asset_name=OpenPDAC-${VERSION}-cpeGNU-24.03-OpenFOAM-13.eb" >> "$GITHUB_OUTPUT"

      - name: Generate EasyConfig
        run: |
          mkdir -p dist
          TEMPLATE="packaging/easybuild/OpenPDAC-LUMI.eb.in"
          OUTFILE="dist/${{ steps.meta.outputs.asset_name }}"

          cp "$TEMPLATE" "$OUTFILE"
          sed -i "s/@VERSION@/${{ steps.meta.outputs.version }}/g" "$OUTFILE"

          echo "Generated file:"
          sed -n '1,200p' "$OUTFILE"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: easyconfig-${{ steps.meta.outputs.version }}
          path: dist/*.eb

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          files: dist/${{ steps.meta.outputs.asset_name }}
          generate_release_notes: true
