name: "C++ Linter: clang-tidy"

# -----------------------------------------------------------------------------
# This workflow is based on the original workflow written by:
#   Dr. Bin Song
#   Research Scientist, SPMT Group
#   High-Performance Computing Center Stuttgart
#
# The present version has been revised to:
#   - keep all comments and messages in English
#   - remove the Conda environment activation, since Conda is only required for
#     simulation pre-processing and post-processing, not for linting
# -----------------------------------------------------------------------------

on:
  pull_request:
    branches: [main]
  push:
    tags:
      - '[0-9]+.*'

jobs:
  cpp-linter:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo sh -c "wget -O - https://dl.openfoam.org/gpg.key | apt-key add -"
          sudo add-apt-repository http://dl.openfoam.org/ubuntu
          sudo apt-get update
          sudo apt-get -y install openfoam13 wget
          sudo apt-get -y install libc6 lsb-release software-properties-common gnupg bear

      - name: Compile solver and utilities
        shell: bash
        run: |
          bash -ic '
            set +m

            source /opt/openfoam13/etc/bashrc

            echo "Compiling OpenPDAC solver..."
            cd applications/OpenPDAC
            bear -- ./Allwmake
          '

      - name: Run cpp-linter with clang-tidy
        uses: cpp-linter/cpp-linter-action@v2
        id: linter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Path to the compilation database generated by Bear
          database: "applications/OpenPDAC/"
          style: ""
          tidy-checks: ""

      - name: Fail if clang-tidy reports issues
        if: steps.linter.outputs.checks-failed > 0
        shell: bash
        run: exit 1
