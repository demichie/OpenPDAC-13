name: "CodeQL Advanced"

# -----------------------------------------------------------------------------
# This workflow is based on the original workflow written by:
#   Dr. Bin Song
#   Research Scientist, SPMT Group
#   High-Performance Computing Center Stuttgart
#
# The present version has been revised to:
#   - keep all comments and messages in English
#   - remove the Conda environment setup, since Conda is only required for
#     simulation pre-processing and post-processing, not for static analysis
# -----------------------------------------------------------------------------

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "45 18 * * 0"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest

    permissions:
      # Required for all CodeQL workflows
      security-events: write

      # Required to fetch internal or private CodeQL packs
      packages: read

      # Required for private repositories
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: c-cpp
            build-mode: manual
          - language: python
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo sh -c "wget -O - https://dl.openfoam.org/gpg.key | apt-key add -"
          sudo add-apt-repository http://dl.openfoam.org/ubuntu
          sudo apt-get update
          sudo apt-get -y install openfoam13 wget

      # Initialize the CodeQL tools for scanning.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      - name: Run manual build steps
        if: matrix.build-mode == 'manual'
        shell: bash
        run: |
          bash -ic '
            set +m

            source /opt/openfoam13/etc/bashrc

            echo "Compiling OpenPDAC solver..."
            cd applications/OpenPDAC
            ./Allwmake
            cd ../../applications/utilities/topoGrid
            wmake
          '

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
